[tox]
# Test on every supported interpreter, plus the quality gates.
envlist = py310, py311, py312, lint, type, ansible
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run the unit test suite with coverage
extras = test
commands =
    pytest {posargs:--cov=kolla_otel --cov-report=term-missing --cov-report=xml}

[testenv:lint]
description = Lint and check formatting with ruff
skip_install = True
extras =
deps =
    ruff==0.15.15
commands =
    ruff check kolla_otel tests examples
    ruff format --check kolla_otel tests examples

[testenv:format]
description = Auto-format the codebase with ruff (developer helper)
skip_install = True
extras =
deps =
    ruff==0.15.15
commands =
    ruff check --fix kolla_otel tests examples
    ruff format kolla_otel tests examples

[testenv:type]
description = Static type checking with mypy
extras = type
commands =
    mypy kolla_otel

[testenv:ansible]
description = Lint the Ansible role/playbook with ansible-lint
# Installs the package (pulling kolla-ansible), so its custom modules land in
# the env's share dir; point ANSIBLE_LIBRARY there so ansible-lint's
# syntax-check can resolve kolla_container / kolla_container_facts.
extras =
deps =
    ansible-lint>=24.0
setenv =
    ANSIBLE_LIBRARY = {envdir}/share/kolla-ansible/ansible/library
    ANSIBLE_MODULE_UTILS = {envdir}/share/kolla-ansible/ansible/module_utils
commands =
    ansible-lint ansible

[testenv:precommit]
description = Run every pre-commit/prek hook against all files
skip_install = True
extras =
deps =
    prek>=0.4
commands =
    prek run --all-files {posargs}

# Maps CI interpreter versions to tox environments for tox-gh-actions.
[gh]
python =
    3.10 = py310
    3.11 = py311
    3.12 = py312
