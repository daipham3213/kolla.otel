---
# Entry playbook run by `kolla-ansible instrument`. Installed alongside
# kolla-ansible's own playbooks under share/kolla-ansible/ansible/, so it
# inherits group_vars/all.yml (kolla_container_engine, docker_common_options,
# …) automatically.
#
# Targets every host by default and instruments only the containers actually
# present there, so the same run is safe across controllers and compute nodes.
- name: Apply OpenTelemetry auto-instrumentation to OpenStack containers
  hosts: "{{ otel_instrument_hosts | default('all') }}"
  gather_facts: false
  serial: "{{ kolla_serial | default('0') }}"
  max_fail_percentage: "{{ kolla_max_fail_percentage | default(100) }}"
  roles:
    - role: otel_instrument
