---
###############################################################################
# kolla-otel :: local OpenTelemetry Collector
#
# Deploys an opentelemetry-collector-contrib container on each host to act as a
# local OTLP endpoint for the instrumented services, but ONLY when the operator
# has not pointed instrumentation at an external collector (i.e.
# `otel_exporter_endpoint` is empty). When an external endpoint is set this role
# is a no-op.
#
# kolla runs every container with host networking, so a collector bound to
# 0.0.0.0:4317 is reachable from the (also host-networked) service containers at
# http://127.0.0.1:4317 — see `otel_local_collector_endpoint` in the
# otel_instrument role defaults, which is the endpoint instrumentation uses in
# this mode.
###############################################################################

# --- Image ------------------------------------------------------------------
otel_collector_image_registry: "docker.io"
otel_collector_image_repository: "otel/opentelemetry-collector-contrib"
otel_collector_image_tag: "latest"
otel_collector_image: >-
  {{ otel_collector_image_registry | regex_replace('/$', '') }}/{{
     otel_collector_image_repository }}:{{ otel_collector_image_tag }}

# --- Container --------------------------------------------------------------
otel_collector_container_name: "otel_collector"
# Host directory holding the rendered collector config, bind-mounted read-only.
otel_collector_config_dir: "/etc/kolla/otel-collector"
# The contrib image reads its config from this path by default.
otel_collector_config_container_path: "/etc/otelcol-contrib/config.yaml"
# Mode of the rendered config file on the host. The contrib image runs as a
# NON-root user (UID 10001), and the file is bind-mounted read-only, so it must
# be world-readable (o+r) for the collector to read it — otherwise it exits
# with "config.yaml: permission denied". Tighten this (e.g. "0640") only if you
# also chown the file to the collector's UID/GID out of band.
otel_collector_config_mode: "0644"
otel_collector_restart_policy: "unless-stopped"
otel_collector_dimensions: {}

# --- Listener ports ---------------------------------------------------------
otel_collector_grpc_port: 4317
otel_collector_http_port: 4318

# --- Collector configuration ------------------------------------------------
# The full collector config is assembled by templates/config.yaml.j2 from the
# per-section options below (one variable per top-level collector config key),
# rendered per host and written to `otel_collector_config_dir/config.yaml`.
# Override any section in globals.yml / group_vars / host_vars for per-host
# control. The defaults form a functional OTLP-in -> debug-out pipeline (all
# received telemetry is logged), so the collector runs out of the box; to
# export to a real backend, add an exporter and list it under each pipeline
# (see the role README).
#
# Each variable maps 1:1 to a top-level section of the collector config:
#   extensions / receivers / processors / exporters / connectors and, under
#   `service`, extensions / pipelines / telemetry. Empty optional sections
#   (extensions, connectors, service.extensions, service.telemetry) are omitted
#   from the rendered file.

# service::extensions (dict of extension configs).
otel_collector_extensions: {}

# receivers::* — where telemetry comes in. OTLP over gRPC (4317) and HTTP
# (4318); the collector binds 0.0.0.0 (reachable over loopback thanks to kolla
# host networking).
otel_collector_receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:{{ otel_collector_grpc_port }}"
      http:
        endpoint: "0.0.0.0:{{ otel_collector_http_port }}"

# processors::* — applied in each pipeline's `processors` list, in order.
otel_collector_processors:
  batch: {}
  resource:
    attributes:
      - key: host.name
        from_attribute: ""
        action: upsert
        value: "${HOSTNAME}"

# exporters::* — where telemetry goes out. The default logs it (`debug`).
otel_collector_exporters:
  debug:
    verbosity: "normal"

# connectors::* (dict of connector configs; empty by default).
otel_collector_connectors: {}

# service.extensions (list of enabled extension names; empty by default).
otel_collector_service_extensions: []

# service.pipelines — wire receivers -> processors -> exporters per signal.
# Lists reference the keys defined in the sections above.
otel_collector_service_pipelines:
  traces:
    receivers: ["otlp"]
    processors: ["resource", "batch"]
    exporters: ["debug"]
  metrics:
    receivers: ["otlp"]
    processors: ["resource", "batch"]
    exporters: ["debug"]
  logs:
    receivers: ["otlp"]
    processors: ["resource", "batch"]
    exporters: ["debug"]

# service.telemetry — the collector's own metrics/logs config (empty = image
# defaults).
otel_collector_service_telemetry: {}

# Optional operator override: a YAML config file (kolla node_custom_config
# convention) DEEP-MERGED onto the assembled config, most-specific first:
#     <node_custom_config>/otel-collector/<inventory_hostname>/config.yaml
#     <node_custom_config>/otel-collector/config.yaml
# Nested mappings merge (override wins); lists are replaced wholesale.
otel_collector_custom_config_dir: >-
  {{ node_custom_config | default('/etc/kolla/config') }}/otel-collector
