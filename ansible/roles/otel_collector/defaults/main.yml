---
###############################################################################
# kolla-otel :: local OpenTelemetry Collector
#
# Deploys an opentelemetry-collector-contrib container on each host to act as a
# local OTLP endpoint for the instrumented services, but ONLY when the operator
# has not pointed instrumentation at an external collector (i.e.
# `otel_exporter_endpoint` is empty). When an external endpoint is set this role
# is a no-op.
#
# kolla runs every container with host networking, so a collector bound to
# 0.0.0.0:4317 is reachable from the (also host-networked) service containers at
# http://127.0.0.1:4317 — see `otel_local_collector_endpoint` in the
# otel_instrument role defaults, which is the endpoint instrumentation uses in
# this mode.
###############################################################################

# --- Image ------------------------------------------------------------------
otel_collector_image_registry: "docker.io"
otel_collector_image_repository: "otel/opentelemetry-collector-contrib"
otel_collector_image_tag: "latest"
otel_collector_image: >-
  {{ otel_collector_image_registry | regex_replace('/$', '') }}/{{
     otel_collector_image_repository }}:{{ otel_collector_image_tag }}

# --- Container --------------------------------------------------------------
otel_collector_container_name: "otel_collector"
# Host directory holding the rendered collector config, bind-mounted read-only.
otel_collector_config_dir: "/etc/kolla/otel-collector"
# The contrib image reads its config from this path by default.
otel_collector_config_container_path: "/etc/otelcol-contrib/config.yaml"
# Mode of the rendered config file on the host. The contrib image runs as a
# NON-root user (UID 10001), and the file is bind-mounted read-only, so it must
# be world-readable (o+r) for the collector to read it — otherwise it exits
# with "config.yaml: permission denied". Tighten this (e.g. "0640") only if you
# also chown the file to the collector's UID/GID out of band.
otel_collector_config_mode: "0644"
otel_collector_restart_policy: "unless-stopped"
otel_collector_dimensions: {}

# --- Listener ports ---------------------------------------------------------
otel_collector_grpc_port: 4317
otel_collector_http_port: 4318

# --- Collector pipeline configuration ---------------------------------------
# There are two ways to configure the collector:
#
# 1. An operator-provided config FILE, following kolla's node_custom_config
#    convention (like /etc/kolla/config/nova/nova.conf). Drop a complete
#    collector config at one of these paths (scanned most-specific first, on
#    the deploy host); the first that exists REPLACES the built-in config:
#        <node_custom_config>/otel-collector/<inventory_hostname>/config.yaml
#        <node_custom_config>/otel-collector/config.yaml
#    e.g. /etc/kolla/config/otel-collector/config.yaml
otel_collector_custom_config_dir: >-
  {{ node_custom_config | default('/etc/kolla/config') }}/otel-collector

# 2. The inline `otel_collector_config` below (used only when no override file
#    is found). Rendered verbatim to the collector config file. The default is
#    a functional OTLP-in -> debug-out pipeline (received telemetry is logged),
#    so the collector runs out of the box; override it in globals.yml, or use a
#    file per (1), to export to a real backend (add an otlp/otlphttp exporter
#    pointing at your observability stack and list it under each pipeline).
otel_collector_config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:{{ otel_collector_grpc_port }}"
        http:
          endpoint: "0.0.0.0:{{ otel_collector_http_port }}"
  processors:
    batch: { }
    resource:
      attributes:
        - key: host.name
          from_attribute: ""
          action: upsert
          value: "${HOSTNAME}"
  exporters:
    debug:
      verbosity: "normal"
  service:
    pipelines:
      traces:
        receivers:
          - "otlp"
        processors:
          - "resource"
          - "batch"
        exporters:
          - "debug"
      metrics:
        receivers:
          - "otlp"
        processors:
          - "resource"
          - "batch"
        exporters:
          - "debug"
      logs:
        receivers:
          - "otlp"
        processors:
          - "resource"
          - "batch"
        exporters:
          - "debug"
