---
# Injects one service. Included per target container from tasks/main.yml with
# `otel_service` set. Runs only for containers already confirmed present.

- name: "OTel | Resolve language and derived values | {{ otel_service.name }}"
  ansible.builtin.set_fact:
    # Deep-merge any user override onto the built-in language definition so a
    # partial `otel_languages` override never drops `activation` etc.
    otel_lang: >-
      {{ otel_language_defaults[otel_service.language] | default({})
         | combine(otel_languages[otel_service.language] | default({}),
                   recursive=True) }}
    otel_attrs: "{{ otel_container_facts.containers[otel_service.container_name] }}"
    otel_current_env: "{{ otel_env_facts.envs[otel_service.container_name] | default({}) }}"
    # Host directory the agent is staged into and bind-mounted from. One per
    # language (shared by every service of that language on the host).
    otel_host_lib_dir: "{{ otel_host_lib_path }}/{{ otel_service.language }}"
    # Records the image id the staged files came from (kept outside the mounted
    # dir), so we re-stage only when the image actually changes.
    otel_marker_file: "{{ otel_host_lib_path }}/.{{ otel_service.language }}-image-id"

- name: "OTel | Resolve agent image | {{ otel_service.name }}"
  ansible.builtin.set_fact:
    otel_agent_image: >-
      {{ otel_image_registry | regex_replace('/$', '') }}/{{
         otel_lang.image_component }}:{{ otel_image_version }}

# --- Stage the agent into a host path, refreshed when the image changes ----
# Done once per language per run (subsequent services of the same language
# reuse the already-staged directory).
- name: "OTel | Ensure host library directory exists | {{ otel_service.name }}"
  become: true
  ansible.builtin.file:
    path: "{{ otel_host_lib_dir }}"
    state: directory
    mode: "0755"

- name: "OTel | Pull and stage the agent | {{ otel_service.name }}"
  when: otel_service.language not in (otel_staged_languages | default([]))
  become: true
  block:
    - name: "OTel | Pull agent image | {{ otel_service.name }}"
      ansible.builtin.command:
        argv:
          - "{{ kolla_container_engine }}"
          - pull
          - "{{ otel_agent_image }}"
      register: otel_pull
      changed_when: >-
        'Downloaded newer image' in otel_pull.stdout
        or 'Writing manifest' in otel_pull.stdout

    - name: "OTel | Inspect the pulled image id | {{ otel_service.name }}"
      ansible.builtin.command:
        argv:
          - "{{ kolla_container_engine }}"
          - image
          - inspect
          - "--format"
          - "{{ '{{ .Id }}' }}"
          - "{{ otel_agent_image }}"
      register: otel_image_id
      changed_when: false

    - name: "OTel | Read the staged image marker | {{ otel_service.name }}"
      ansible.builtin.slurp:
        src: "{{ otel_marker_file }}"
      register: otel_marker
      failed_when: false

    - name: "OTel | Refresh the staged agent when the image changed | {{ otel_service.name }}"
      when: >-
        otel_marker.content is not defined
        or (otel_marker.content | b64decode | trim)
           != (otel_image_id.stdout | trim)
      block:
        - name: "OTel | Empty the host library directory | {{ otel_service.name }}"
          ansible.builtin.file:
            path: "{{ otel_host_lib_dir }}"
            state: "{{ item }}"
            mode: "0755"
          loop:
            - absent
            - directory

        - name: "OTel | Copy agent from image into host path | {{ otel_service.name }}"
          ansible.builtin.command:
            argv:
              - "{{ kolla_container_engine }}"
              - run
              - "--rm"
              - "--entrypoint"
              - cp
              - "--volume"
              - "{{ otel_host_lib_dir }}:/otel-dst"
              - "{{ otel_agent_image }}"
              - "-a"
              - "{{ otel_lang.source_path | regex_replace('/$', '') }}/."
              - "/otel-dst/"
          changed_when: true

        - name: "OTel | Record the staged image id | {{ otel_service.name }}"
          ansible.builtin.copy:
            dest: "{{ otel_marker_file }}"
            content: "{{ otel_image_id.stdout | trim }}\n"
            mode: "0644"

    - name: "OTel | Mark language staged for this run | {{ otel_service.name }}"
      ansible.builtin.set_fact:
        otel_staged_languages: >-
          {{ (otel_staged_languages | default([])) + [otel_service.language] }}

- name: "OTel | Compute resource attributes | {{ otel_service.name }}"
  vars:
    otel_ra: >-
      {{ otel_resource_attributes_base
         | combine(otel_service.resource_attributes | default({})) }}
    otel_ra_sorted: "{{ otel_ra | dict2items | sort(attribute='key') }}"
  ansible.builtin.set_fact:
    otel_ra_string: >-
      {{ otel_ra_sorted | map(attribute='key')
         | zip(otel_ra_sorted | map(attribute='value'))
         | map('join', '=') | join(',') }}

- name: "OTel | Build environment and volumes | {{ otel_service.name }}"
  ansible.builtin.set_fact:
    # Layered lowest -> highest precedence: existing container env, the common
    # OTEL_* export vars, deployment-wide extra env, this service's identity,
    # this service's own extra env, and finally the language activation (kept
    # last so it can never be clobbered and the agent always loads).
    otel_new_environment: >-
      {{ otel_current_env
         | combine(otel_common_environment)
         | combine(otel_extra_environment)
         | combine({
             'OTEL_SERVICE_NAME':
               otel_service.otel_service_name | default(otel_service.name),
             'OTEL_RESOURCE_ATTRIBUTES': otel_ra_string,
           })
         | combine(otel_service.environment | default({}))
         | combine(otel_lang.activation) }}
    # Drop any existing bind whose destination is our mount_path (e.g. a mount
    # left by an earlier run — named volume or host path) before adding ours,
    # so the recreate never hits "Duplicate mount point".
    otel_new_volumes: >-
      {{ (otel_attrs.HostConfig.Binds | default([]))
         | reject('match',
                  '^[^:]+:' ~ (otel_lang.mount_path | regex_escape)
                  ~ '(:.*)?$')
         | list
         + [otel_host_lib_dir ~ ':' ~ otel_lang.mount_path ~ ':ro'] }}

# Docker reports healthcheck durations in nanoseconds; kolla's
# parse_healthcheck expects seconds and every key present, so convert here.
- name: "OTel | Preserve healthcheck | {{ otel_service.name }}"
  vars:
    hc: "{{ otel_attrs.Config.Healthcheck | default({}) }}"
  ansible.builtin.set_fact:
    otel_healthcheck: >-
      {{ omit if (not hc or hc.Test | default([]) in [['NONE'], []]) else {
           'test': hc.Test,
           'interval': (hc.Interval | default(0) | int) // 1000000000,
           'timeout': (hc.Timeout | default(0) | int) // 1000000000,
           'start_period': (hc.StartPeriod | default(0) | int) // 1000000000,
           'retries': hc.Retries | default(3) | int,
         } }}

# --- Recreate the container with the instrumentation applied ---------------
# Mirrors kolla's own "recreate_or_restart_container" handler idiom. Attributes
# kolla's recreate would not otherwise preserve (privileged, pid/ipc mode,
# capabilities, healthcheck) are read back from the running container. This is
# what makes special containers such as nova_compute (privileged, ipc_mode
# host) survive the recreate unchanged apart from the injected env/volume.
- name: "OTel | Recreate container with OpenTelemetry | {{ otel_service.name }}"
  become: true
  kolla_container:
    action: recreate_or_restart_container
    common_options: "{{ docker_common_options }}"
    name: "{{ otel_service.container_name }}"
    image: "{{ otel_attrs.Config.Image }}"
    environment: "{{ otel_new_environment }}"
    volumes: "{{ otel_new_volumes }}"
    privileged: "{{ otel_attrs.HostConfig.Privileged | default(false) }}"
    pid_mode: >-
      {{ otel_attrs.HostConfig.PidMode
         if (otel_attrs.HostConfig.PidMode | default('')) == 'host'
         else omit }}
    ipc_mode: >-
      {{ otel_attrs.HostConfig.IpcMode
         if (otel_attrs.HostConfig.IpcMode | default('')) == 'host'
         else omit }}
    cap_add: "{{ otel_attrs.HostConfig.CapAdd | default([]) or omit }}"
    security_opt: "{{ otel_attrs.HostConfig.SecurityOpt | default([]) or omit }}"
    healthcheck: "{{ otel_healthcheck }}"
